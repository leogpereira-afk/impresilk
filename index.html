<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1877f2">
  <title>Impresilk — Controle de Instalação</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Impresilk">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────────────────── -->
  <div id="login-screen" class="login-wrap">
    <div class="login-card">
      <h2>Impresilk</h2>
      <p class="subtitle">Controle de Instalação</p>
      <div class="field">
        <label for="login-user">Usuário</label>
        <select id="login-user"></select>
      </div>
      <div class="field mt-12">
        <label for="login-pass">Senha</label>
        <input type="password" id="login-pass" placeholder="Senha do papel" autocomplete="current-password">
      </div>
      <button class="btn-primary w-100 mt-12" id="login-btn">Entrar</button>
      <div id="login-error" class="login-error hidden"></div>
      <p class="text-muted mt-12">Espelho do instalador: <a href="equipe.html" class="inline-link">abrir equipe.html</a></p>
    </div>
  </div>

  <!-- ── App ───────────────────────────────────────────────────────────── -->
  <div id="app" class="hidden">

    <!-- Topbar -->
    <header class="topbar">
      <img class="logo-img" id="topbar-logo" alt="Impresilk">
      <div class="topbar-user">
        <span id="user-badge"></span>
        <span id="topbar-date" class="topbar-date"></span>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost btn-sm admin-only" id="btn-espelhos" title="Espelhos somente-leitura para instaladores e comercial">🪞 Espelhos</button>
        <button class="btn-ghost btn-sm edit-only" id="btn-import-pdf" title="Importar O.S a partir do PDF do ERP">📄 Importar PDF</button>
        <button class="btn-primary btn-sm edit-only" id="btn-nova-os">+ Nova O.S</button>
        <button class="btn-ghost btn-sm" id="btn-instrucoes" title="Como usar o sistema">❔ Instruções</button>
        <button class="btn-ghost btn-sm" id="btn-verificar" title="Conferir no servidor se as O.S foram salvas na nuvem">☁️ Verificar</button>
        <span id="sync-indicator" class="sync-indicator ok" title="Status de sincronização">✅</span>
        <button class="btn-ghost btn-sm" id="btn-logout" title="Sair">⏻</button>
      </div>
    </header>

    <!-- Frase motivacional -->
    <div id="frase-bar" class="frase-bar"></div>

    <!-- Tabs -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="painel">Painel</button>
      <button class="tab" data-tab="pcp">PCP</button>
      <button class="tab" data-tab="programacao">Instalação</button>
      <button class="tab" data-tab="execucao">Execução</button>
      <button class="tab" data-tab="retrabalho">Retrabalho</button>
      <button class="tab" data-tab="finalizados">Finalizados</button>
      <button class="tab" data-tab="controle">Painel de Controle</button>
    </nav>

    <!-- Panels -->
    <main>
      <section class="tab-panel active" data-panel="painel" id="panel-painel"></section>
      <section class="tab-panel" data-panel="pcp" id="panel-pcp"></section>
      <section class="tab-panel" data-panel="programacao" id="panel-programacao"></section>
      <section class="tab-panel" data-panel="execucao" id="panel-execucao"></section>
      <section class="tab-panel" data-panel="retrabalho" id="panel-retrabalho"></section>
      <section class="tab-panel" data-panel="finalizados" id="panel-finalizados"></section>
      <section class="tab-panel" data-panel="controle" id="panel-controle"></section>
    </main>
  </div>

  <!-- Modal da O.S -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-os"></div>
  </div>

  <!-- Pop-up de múltipla escolha (ferramentas, equipe, etc.) -->
  <div id="picker-overlay" class="picker-overlay hidden">
    <div class="picker-box">
      <div class="picker-head">
        <h3 id="picker-title">Selecionar</h3>
        <button class="modal-close" id="picker-close">×</button>
      </div>
      <div class="picker-list" id="picker-list"></div>
      <div class="picker-add">
        <input id="picker-novo" placeholder="+ adicionar novo">
        <button class="btn-ghost btn-sm" id="picker-add-btn">Adicionar</button>
      </div>
      <button class="btn-primary w-100 mt-12" id="picker-ok">Confirmar</button>
    </div>
  </div>

  <!-- Conflito -->
  <div id="conflict-dialog" class="conflict-dialog hidden">
    <div class="conflict-box">
      <h3>⚠️ Conflito de edição</h3>
      <p id="conflict-msg">Esta O.S foi alterada em outro aparelho.</p>
      <div class="conflict-actions">
        <button class="btn-primary" id="conflict-reload">Recarregar (servidor)</button>
        <button class="btn-danger" id="conflict-overwrite">Sobrescrever (meu)</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container"></div>

  <!-- Celebração -->
  <div id="celebra-overlay" class="celebra-overlay hidden">
    <div class="celebra-box" id="celebra-box"></div>
  </div>

  <!-- pdf.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="config.js"></script>
  <script src="logo.js"></script>
  <script src="frases.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
</html>
